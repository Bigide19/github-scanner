<svg xmlns="http://www.w3.org/2000/svg" width="960" height="620" viewBox="0 0 960 620">
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="960" height="620" rx="12" fill="#0f172a"/>

  <!-- Header bar -->
  <rect y="0" width="960" height="48" rx="12" fill="#1e293b"/>
  <rect y="12" width="960" height="36" fill="#1e293b"/>
  <!-- GitHub icon placeholder -->
  <circle cx="36" cy="24" r="10" fill="#e2e8f0"/>
  <text x="54" y="29" fill="#f1f5f9" font-size="15" font-weight="bold">GitHub Scanner</text>
  <text x="870" y="29" fill="#94a3b8" font-size="12">EN</text>
  <circle cx="920" cy="24" r="12" fill="#334155"/>
  <circle cx="920" cy="24" r="6" fill="#fbbf24" opacity="0.7"/>

  <!-- Input section -->
  <rect x="32" y="64" width="896" height="130" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="52" y="90" fill="#94a3b8" font-size="11">Personal Access Token (PAT)</text>
  <rect x="52" y="96" width="856" height="32" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="64" y="116" fill="#475569" font-size="12">ghp_••••••••••••••••</text>

  <text x="52" y="150" fill="#94a3b8" font-size="11">Organization</text>
  <rect x="52" y="156" width="220" height="28" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="64" y="174" fill="#e2e8f0" font-size="12">acme-corp</text>

  <rect x="290" y="156" width="110" height="28" rx="6" fill="#334155"/>
  <text x="315" y="174" fill="#e2e8f0" font-size="11">Load Teams</text>

  <text x="420" y="150" fill="#94a3b8" font-size="11">Team</text>
  <rect x="420" y="156" width="260" height="28" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="432" y="174" fill="#e2e8f0" font-size="12">2 team(s) selected</text>

  <rect x="700" y="156" width="208" height="28" rx="6" fill="#6366f1"/>
  <text x="782" y="174" fill="white" font-size="12" font-weight="600" text-anchor="middle">Scan</text>

  <!-- Team chips -->
  <rect x="420" y="188" width="72" height="20" rx="10" fill="rgba(99,102,241,0.15)"/>
  <text x="440" y="201" fill="#a5b4fc" font-size="10">Backend</text>
  <rect x="500" y="188" width="76" height="20" rx="10" fill="rgba(99,102,241,0.15)"/>
  <text x="518" y="201" fill="#a5b4fc" font-size="10">Frontend</text>

  <!-- Toolbar -->
  <rect x="32" y="210" width="896" height="40" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="52" y="234" fill="#e2e8f0" font-size="12" font-weight="500">18 repositories found</text>
  <rect x="210" y="220" width="1" height="18" fill="#334155"/>
  <!-- Filter chips -->
  <rect x="224" y="222" width="12" height="12" rx="2" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="242" y="233" fill="#94a3b8" font-size="11">Show Archived</text>
  <rect x="340" y="220" width="52" height="18" rx="4" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="351" y="232" fill="#94a3b8" font-size="10">All</text>
  <rect x="400" y="220" width="80" height="18" rx="4" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="411" y="232" fill="#94a3b8" font-size="10">Permission</text>
  <!-- Export buttons -->
  <rect x="710" y="218" width="106" height="24" rx="6" fill="transparent" stroke="#475569" stroke-width="1"/>
  <text x="730" y="234" fill="#94a3b8" font-size="10">Copy Markdown</text>
  <rect x="824" y="218" width="96" height="24" rx="6" fill="transparent" stroke="#475569" stroke-width="1"/>
  <text x="840" y="234" fill="#94a3b8" font-size="10">Download CSV</text>

  <!-- Table header -->
  <rect x="32" y="260" width="896" height="34" rx="0" fill="#1e293b"/>
  <!-- Round top corners only -->
  <rect x="32" y="260" width="896" height="10" rx="10" fill="#1e293b"/>
  <text x="52" y="282" fill="#64748b" font-size="10" font-weight="600" letter-spacing="0.5">NAME</text>
  <text x="370" y="282" fill="#64748b" font-size="10" font-weight="600" letter-spacing="0.5">DESCRIPTION</text>
  <text x="680" y="282" fill="#64748b" font-size="10" font-weight="600" letter-spacing="0.5">UPDATED</text>
  <text x="830" y="282" fill="#64748b" font-size="10" font-weight="600" letter-spacing="0.5">PERMISSION</text>

  <!-- Row 1 -->
  <rect x="32" y="294" width="896" height="42" fill="#0f172a"/>
  <circle cx="52" cy="315" r="5.5" fill="#fbbf24" opacity="0.6"/>
  <text x="66" y="319" fill="#818cf8" font-size="13">api-gateway</text>
  <text x="370" y="319" fill="#94a3b8" font-size="12">Main API gateway service</text>
  <text x="680" y="319" fill="#64748b" font-size="12">Mar 28, 2026</text>
  <rect x="830" y="305" width="54" height="20" rx="10" fill="rgba(239,68,68,0.15)"/>
  <text x="842" y="318" fill="#fca5a5" font-size="10" font-weight="600">admin</text>

  <!-- Row 2 -->
  <rect x="32" y="336" width="896" height="42" fill="#0f172a" opacity="0.6"/>
  <circle cx="52" cy="357" r="5.5" fill="#fbbf24" opacity="0.6"/>
  <text x="66" y="361" fill="#818cf8" font-size="13">web-dashboard</text>
  <text x="370" y="361" fill="#94a3b8" font-size="12">Internal admin dashboard</text>
  <text x="680" y="361" fill="#64748b" font-size="12">Mar 25, 2026</text>
  <rect x="830" y="347" width="46" height="20" rx="10" fill="rgba(96,165,250,0.15)"/>
  <text x="840" y="360" fill="#93c5fd" font-size="10" font-weight="600">push</text>

  <!-- Row 3 -->
  <rect x="32" y="378" width="896" height="42" fill="#0f172a"/>
  <circle cx="52" cy="399" r="5.5" fill="#4ade80" opacity="0.6"/>
  <text x="66" y="403" fill="#818cf8" font-size="13">design-system</text>
  <text x="370" y="403" fill="#94a3b8" font-size="12">Shared UI component library</text>
  <text x="680" y="403" fill="#64748b" font-size="12">Mar 22, 2026</text>
  <rect x="830" y="389" width="68" height="20" rx="10" fill="rgba(251,146,60,0.15)"/>
  <text x="840" y="402" fill="#fdba74" font-size="10" font-weight="600">maintain</text>

  <!-- Row 4 -->
  <rect x="32" y="420" width="896" height="42" fill="#0f172a" opacity="0.6"/>
  <circle cx="52" cy="441" r="5.5" fill="#fbbf24" opacity="0.6"/>
  <text x="66" y="445" fill="#818cf8" font-size="13">auth-service</text>
  <text x="370" y="445" fill="#94a3b8" font-size="12">OAuth2 authentication microservice</text>
  <text x="680" y="445" fill="#64748b" font-size="12">Mar 18, 2026</text>
  <rect x="830" y="431" width="54" height="20" rx="10" fill="rgba(239,68,68,0.15)"/>
  <text x="842" y="444" fill="#fca5a5" font-size="10" font-weight="600">admin</text>

  <!-- Row 5 -->
  <rect x="32" y="462" width="896" height="42" fill="#0f172a"/>
  <circle cx="52" cy="483" r="5.5" fill="#fbbf24" opacity="0.6"/>
  <text x="66" y="487" fill="#818cf8" font-size="13">infrastructure-terraform</text>
  <text x="370" y="487" fill="#94a3b8" font-size="12">IaC for AWS resources</text>
  <text x="680" y="487" fill="#64748b" font-size="12">Mar 15, 2026</text>
  <rect x="830" y="473" width="50" height="20" rx="10" fill="rgba(168,85,247,0.15)"/>
  <text x="840" y="486" fill="#c4b5fd" font-size="10" font-weight="600">triage</text>

  <!-- Row 6 -->
  <rect x="32" y="504" width="896" height="42" fill="#0f172a" opacity="0.6"/>
  <circle cx="52" cy="525" r="5.5" fill="#4ade80" opacity="0.6"/>
  <text x="66" y="529" fill="#818cf8" font-size="13">docs</text>
  <text x="370" y="529" fill="#94a3b8" font-size="12">Public documentation site</text>
  <text x="680" y="529" fill="#64748b" font-size="12">Mar 10, 2026</text>
  <rect x="830" y="515" width="38" height="20" rx="10" fill="rgba(148,163,184,0.15)"/>
  <text x="838" y="528" fill="#94a3b8" font-size="10" font-weight="600">pull</text>

  <!-- Bottom border -->
  <rect x="32" y="546" width="896" height="1" fill="#334155"/>

  <!-- Pagination -->
  <text x="52" y="572" fill="#64748b" font-size="11">Per page</text>
  <rect x="100" y="560" width="40" height="20" rx="4" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="112" y="574" fill="#e2e8f0" font-size="11">30</text>

  <rect x="790" y="558" width="60" height="22" rx="6" fill="transparent" stroke="#475569" stroke-width="1"/>
  <text x="801" y="573" fill="#94a3b8" font-size="10">Previous</text>
  <text x="860" y="573" fill="#94a3b8" font-size="11">1 of 1</text>
  <rect x="900" y="558" width="28" height="22" rx="6" fill="transparent" stroke="#475569" stroke-width="1"/>
  <text x="907" y="573" fill="#94a3b8" font-size="10">Next</text>

</svg>
